version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    
    image: gmail-harvester-bot:latest
    container_name: gmail_bot
    
    restart: unless-stopped
    
    env_file:
      - .env
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    networks:
      - botnet
    
    stop_grace_period: 30s

networks:
  botnet:
    driver: bridge

